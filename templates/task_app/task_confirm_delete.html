{% extends "base.html" %}
{% block title %}Delete Task — SecureTask{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="text-danger"><i class="bi bi-trash me-2"></i>Delete Task</h1>
</div>
<div class="content-card" style="max-width:480px">
  <div class="p-4 text-center">
    <div style="font-size:3rem;margin-bottom:1rem">⚠️</div>
    <h5>Are you sure?</h5>
    <p class="text-muted">You're about to permanently delete <strong>"{{ task.title }}"</strong>. This cannot be undone.</p>
    <form method="post" class="d-flex gap-2 justify-content-center mt-4">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
      <a href="{% url 'task_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
