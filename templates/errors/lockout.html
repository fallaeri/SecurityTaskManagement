<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Account Locked — SecureTask</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff}
    .card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:3rem;text-align:center;max-width:440px}
    .icon{font-size:3.5rem;margin-bottom:1rem}
  </style>

<body>
<div class="card">
  <div class="icon">🔒</div>
  <h2 class="mb-2">Account Temporarily Locked</h2>
  <p class="text-muted">Too many failed login attempts. Your IP has been blocked for 30 minutes.</p>
  <p class="small text-muted">This is an automated security measure to protect your account.</p>
  <a href="/auth/login/" class="btn btn-outline-light mt-2 px-4">Try Again Later</a>
</div>
</body></html>
